---
layout: default
---

<style>
  .back { margin: 0 0 1.5rem; }
  .back a, .entry-nav a { color: #666; }
  .back a:hover, .entry-nav a:hover { color: #999; }

  .entry-header {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    margin: 0 0 1.5rem;
  }
  .entry-header h1 { margin: 0; }
  .entry-header .entry-number { font-size: 0.8rem; color: #555; }

  blockquote {
    border-left: 2px solid #333;
    margin: 0;
    padding-left: 1rem;
    line-height: 1.7;
  }

  blockquote p { margin: 0.5rem 0; }

  blockquote strong { font-size: 0.85em; color: #ccc; }

  .entry-nav {
    display: flex;
    justify-content: space-between;
    margin: 2rem 0 0;
    font-size: 0.85em;
  }
  .entry-nav .next { margin-left: auto; }
</style>

<p class="back"><a href="{{ '/' | relative_url }}">&larr; all entries</a></p>

<div class="entry-header">
  <h1>{{ page.title }}</h1>
  <span class="entry-number">#{{ page.slug | slice: 0, 4 }}</span>
</div>

{{ content }}

<nav class="entry-nav">
  {% if page.previous %}
    <a href="{{ page.previous.url | relative_url }}">&larr; {{ page.previous.title }}</a>
  {% endif %}
  {% if page.next %}
    <a class="next" href="{{ page.next.url | relative_url }}">{{ page.next.title }} &rarr;</a>
  {% endif %}
</nav>
