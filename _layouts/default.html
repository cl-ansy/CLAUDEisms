<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
  <style>
    body {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      max-width: 640px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.6;
      color: #b0b0b0;
      background: #1e1e1e;
    }

    h1, h2 { color: #ccc; margin: 0 0 0.5rem; }
    h1 { font-size: 1.5rem; }
    h2 { font-size: 1.3rem; }

    p { margin: 0 0 1rem; }

    a { color: #ccc; text-decoration: none; }
    a:hover { color: #e0e0e0; text-decoration: underline; }

    code {
      font-family: inherit;
      font-size: inherit;
      background: #2a2a2a;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      color: #d4bc7e;
    }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
